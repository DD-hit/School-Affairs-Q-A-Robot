<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页面预览</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background: #1677ff;
            color: white;
            padding: 16px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
        }
        .auth-card {
            padding: 32px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .footer {
            background: #f5f5f5;
            padding: 24px 0;
            text-align: center;
            margin-top: 60px;
        }
        .footer-links {
            margin-bottom: 16px;
        }
        .footer-link {
            color: #595959;
            text-decoration: none;
            margin: 0 12px;
        }
        .footer-link:hover {
            color: #1677ff;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="navbar">
        <div class="container">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">
                校务问答机器人系统
            </a>
            <a href="index.html" style="color: white; text-decoration: none; float: right;">
                返回首页
            </a>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <h2 style="text-align: center; color: #1677ff;">登录</h2>
                    <p style="text-align: center; color: #595959;">校园政务服务智能问答平台</p>
                    
                    <div style="margin: 24px 0;">
                        <input type="text" placeholder="请输入学号/工号" style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px;">
                        <input type="password" placeholder="请输入密码" style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px;">
                        <button style="width: 100%; padding: 12px; background: #1677ff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            登录
                        </button>
                    </div>
                    
                    <p style="text-align: center; color: #595959;">
                        还没有账号？ <a href="#" style="color: #1677ff;">立即注册</a>
                    </p>
                    
                    <!-- 注意：这里没有快速链接按钮了 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 底部栏 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="index.html" class="footer-link">首页</a>
                <a href="forum.html" class="footer-link">校务论坛</a>
                <a href="help.html" class="footer-link">使用帮助</a>
                <a href="#" class="footer-link">关于我们</a>
                <a href="#" class="footer-link">隐私政策</a>
            </div>
            <div style="color: #8c8c8c; font-size: 14px;">
                © 2026 校务问答机器人系统. 版权所有.
            </div>
        </div>
    </footer>
</body>
</html>
