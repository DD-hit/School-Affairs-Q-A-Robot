<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热门问题点击测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .search-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .hot-tag {
            padding: 8px 16px;
            background: #f0f9ff;
            border: 1px solid #1677ff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1677ff;
        }
        .hot-tag:hover {
            background: #1677ff;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>热门问题点击测试</h1>
    
    <input type="text" class="search-input" id="question-input" placeholder="点击热门问题会自动填充到这里">
    
    <div class="hot-tags">
        <div class="hot-tag">如何申请奖学金？</div>
        <div class="hot-tag">选课系统什么时候开放？</div>
        <div class="hot-tag">宿舍报修流程是什么？</div>
        <div class="hot-tag">校园卡丢失怎么办？</div>
    </div>
    
    <div id="log" style="background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; min-height: 100px;"></div>
    
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += message + '<br>';
            console.log(message);
        }
        
        function setupHotQuestionClicks() {
            try {
                log('正在设置热门问题点击事件...');
                
                const hotTags = document.querySelectorAll('.hot-tag');
                log(`找到 ${hotTags.length} 个热门问题标签`);
                
                hotTags.forEach((tag, index) => {
                    // 移除可能存在的旧事件
                    tag.onclick = null;
                    
                    // 添加新事件
                    tag.onclick = function() {
                        const question = this.textContent;
                        log(`点击热门问题[${index}]: ${question}`);
                        
                        // 填充到搜索框
                        const searchInput = document.getElementById('question-input');
                        
                        if (searchInput) {
                            searchInput.value = question;
                            searchInput.focus(); // 聚焦到搜索框
                            log(`✅ 已填充到搜索框: ${question}`);
                        }
                        
                        // 视觉反馈
                        this.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            this.style.transform = '';
                        }, 200);
                    };
                });
                
                log(`✅ 成功为 ${hotTags.length} 个热门问题标签添加了点击事件`);
                
            } catch (error) {
                log('设置热门问题点击事件时出错: ' + error.message);
            }
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            log('DOMContentLoaded事件触发');
            setupHotQuestionClicks();
            log('测试准备完成，请点击上面的热门问题标签');
        });
    </script>
</body>
</html>
